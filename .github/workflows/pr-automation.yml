name: PR automation

on:
  pull_request:
    types: [opened]

permissions:
  pull-requests: write

jobs:
  assign-and-label:
    runs-on: ubuntu-latest
    steps:
      - name: Assign PR to author
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          NUMBER: ${{ github.event.pull_request.number }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
        run: gh pr edit "$NUMBER" --add-assignee "$AUTHOR"

      - name: Apply label derived from Conventional Commits prefix
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          NUMBER: ${{ github.event.pull_request.number }}
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail
          # Extract prefix: strip everything from first '(', ':' or '!'.
          PREFIX="${TITLE%%[(:!]*}"
          if [ -z "$PREFIX" ]; then
            echo "Title has no Conventional Commits prefix; skipping label."
            exit 0
          fi
          # Ensure label exists (idempotent — succeeds if already created).
          gh label create "$PREFIX" 2>/dev/null || true
          gh pr edit "$NUMBER" --add-label "$PREFIX"
